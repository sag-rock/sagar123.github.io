<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Proposal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: linear-gradient(to bottom, #ffd1dc, #ff99aa);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  flex-direction: column;
}

h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 2.5rem;
}

.subtitle {
  font-style: italic;
  margin-bottom: 20px;
}

.buttons {
  display: flex;
  gap: 40px;
  justify-content: center;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: linear-gradient(to right, red, pink);
  color: white;
  border: none;
}

.yes:hover {
  box-shadow: 0 0 15px red;
}

.no {
  background: white;
  color: red;
  border: 2px solid red;
  position: fixed;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -50px;
  font-size: 20px;
  animation: floatUp linear infinite;
  opacity: 0;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Celebration */
.celebration {
  display: none;
  flex-direction: column;
  align-items: center;
}

.big-text {
  font-size: 3rem;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.spinner {
  font-size: 40px;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0); }
  100% { transform: rotate(360deg); }
}

.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  background: red;
  top: 0;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="main">
  <div style="font-size:40px; animation:bounce 1s infinite;">🐻</div>
  <h1>Will You Be My Valentine, Kucchu?</h1>
  <div class="subtitle">I've been gathering courage to ask you this...</div>

  <div class="buttons">
    <button class="yes" onclick="sayYes()">Yes</button>
    <button class="no" id="noBtn">No</button>
  </div>

  <p>Every love story is beautiful, but ours is my favourite ❤️</p>
</div>

<div class="celebration" id="celebration">
  <div class="big-text">Yayyyyy!! ❤️</div>
  <div class="spinner">💖</div>
  <p>I knew you'd say yes...U love your Gobar so much💖</p>
</div>

<script>
// Floating hearts
for (let i = 0; i < 15; i++) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(heart);
}

// No button escape logic
const noBtn = document.getElementById("noBtn");
const messages = [
  "Aww come on 🥺",
  "Pretty please? 💕",
  "You don’t mean that 😏",
  "Say yes na 💖",
  "I’ll be really happy 🥹",
  "Give me one chance 🌸",
  "You know you want to 😄",
  "Don’t break my heart 💔",
  "Bas ek baar yes bol do ❤️",
  "You’re too cute to say no 😌"
];
let msgIndex = 0;

noBtn.addEventListener("click", moveNo);

function moveNo() {
  const yesBtn = document.querySelector(".yes").getBoundingClientRect();

  let x, y;
  do {
    x = Math.random() * (window.innerWidth - 100);
    y = Math.random() * (window.innerHeight - 50);
  } while (
    x > yesBtn.left - 100 &&
    x < yesBtn.right + 100 &&
    y > yesBtn.top - 50 &&
    y < yesBtn.bottom + 50
  );

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  noBtn.innerText = messages[msgIndex];
  msgIndex = (msgIndex + 1) % messages.length;
}

// Yes click
function sayYes() {
  document.getElementById("main").style.display = "none";
  document.getElementById("celebration").style.display = "flex";

  document.querySelectorAll(".heart").forEach(h => h.remove());

  // Confetti
  for (let i = 0; i < 120; i++) {
    let conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.left = Math.random() * 100 + "vw";
    conf.style.animationDuration = (2 + Math.random() * 3) + "s";
    conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(conf);
  }
}
</script>

</body>
</html>
